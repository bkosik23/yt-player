<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lekki Odtwarzacz YT</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #111; 
            color: #fff; 
            text-align: center; 
            padding: 15px; 
            margin: 0;
        }
        .container { max-width: 600px; margin: 0 auto; }
        input { 
            width: 85%; 
            padding: 12px; 
            margin: 10px 0; 
            font-size: 16px; 
            border: 1px solid #444; 
            background: #222; 
            color: #fff;
            border-radius: 4px;
        }
        button { 
            width: 89%;
            padding: 12px; 
            font-size: 16px; 
            background: #ff0000; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
            border-radius: 4px;
        }
        button:active { background: #cc0000; }
        .video-container { 
            margin-top: 20px; 
            position: relative; 
            padding-bottom: 56.25%; /* Proporcje 16:9 */
            height: 0; 
            overflow: hidden; 
            background: #000;
            border: 1px solid #333;
        }
        .video-container iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: 0; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Lekki Odtwarzacz Video</h2>
    <p style="font-size: 14px; color: #ccc;">Wklej identyfikator filmu z YouTube (to co jest po "v=" w linku)</p>
    
    <input type="text" id="videoId" placeholder="np. dQw4w9WgXcQ" value="dQw4w9WgXcQ">
    <br>
    <button onclick="loadVideo()">Uruchom film</button>

    <div class="video-container">
        <!-- Ramka z domyślnym, bezpiecznym i lekkim adresem youtube-nocookie -->
        <iframe id="player" src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
    </div>
</div>

<script>
    function loadVideo() {
        var inputVal = document.getElementById('videoId').value.trim();
        var videoId = "";

        // Ta funkcja automatycznie wyciągnie ID, nawet jeśli wkleisz cały link z telefonu!
        if (inputVal.includes("v=")) {
            videoId = inputVal.split("v=")[1].split("&")[0];
        } else if (inputVal.includes("youtu.be/")) {
            videoId = inputVal.split("youtu.be/")[1].split("?")[0];
        } else {
            videoId = inputVal; // jeśli wkleiłeś samo ID
        }

        if(videoId) {
            // Generujemy czysty link bez skryptów śledzących i reklam
            document.getElementById('player').src = "https://www.youtube-nocookie.com/embed/" + videoId;
        } else {
            alert("Proszę wprowadzić poprawny identyfikator lub link do filmu.");
        }
    }
</script>

</body>
</html>
