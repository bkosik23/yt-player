<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odtwarzacz YT dla Lumii</title>
    <style>
        /* Prosty styl bez obciążania procesora */
        body { font-family: sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; background: #ff0000; color: white; border: none; cursor: pointer; }
        .video-box { margin-top: 20px; position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Lekki Odtwarzacz Video</h2>
    <p>Wklej końcówkę linku filmu z YouTube (np. dla watch?v=dQw4w9WgXcQ wklej: dQw4w9WgXcQ)</p>
    
    <input type="text" id="videoId" placeholder="Identyfikator wideo (np. dQw4w9WgXcQ)">
    <br>
    <button onclick="loadVideo()">Uruchom film</button>

    <div class="video-box">
        <!-- Tutaj załaduje się super lekki odtwarzacz, który nie tnie procesora -->
        <iframe id="player" src=""></iframe>
    </div>
</div>

<script>
    function loadVideo() {
        var id = document.getElementById('videoId').value;
        if(id) {
            // Korzystamy z publicznej, ultralekkiej instancji invidious zamiast ciężkiego YouTube
            document.getElementById('player').src = "https://invidious.snopyta.org/embed/" + id;
        } else {
            alert("Wpisz poprawne ID filmu!");
        }
    }
</script>

</body>
</html>
